services:
    # Infraestructura

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      SERVER_PORT: 8080
    networks:
      - banking-network

  accounts-db:
    image: postgres:15-alpine
    container_name: accounts-db
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: accounts_user
      POSTGRES_PASSWORD: accounts_pass
    ports:
      - "5432:5432"
    volumes:
      - accounts-db-data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounts_user -d accounts_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  transactions-db:
    image: postgres:15-alpine
    container_name: transactions-db
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: transactions_user
      POSTGRES_PASSWORD: transactions_pass
    ports:
      - "5433:5432"
    volumes:
      - transactions-db-data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions_user -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-db:
    image: mongo:7.0
    container_name: ai-db
    environment:
      MONGO_INITDB_DATABASE: ai_db
    ports:
      - "27017:27017"
    volumes:
      - ai-db-data:/data/db
    networks:
      - banking-network

# Microservicios

  accounts-service:
    build:
      context: ./accounts-service
      dockerfile: Dockerfile
    container_name: accounts-service
    depends_on:
      accounts-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://accounts_user:accounts_pass@accounts-db:5432/accounts_db
      KAFKA_BROKERS: kafka:29092
      NODE_ENV: production
    networks:
      - banking-network
    restart: on-failure

  transactions-service:
    build:
      context: ./transactions-service
      dockerfile: Dockerfile
    container_name: transactions-service
    depends_on:
      transactions-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://transactions_user:transactions_pass@transactions-db:5432/transactions_db
      KAFKA_BROKERS: kafka:29092
      ACCOUNTS_SERVICE_URL: http://accounts-service:3001
      NODE_ENV: production
    networks:
      - banking-network
    restart: on-failure

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    depends_on:
      - kafka
      - ai-db
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://ai-db:27017/ai_db
      KAFKA_BROKERS: kafka:29092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-mock}
      NODE_ENV: production
    networks:
      - banking-network
    restart: on-failure

networks:
  banking-network:
    driver: bridge

volumes:
  accounts-db-data:
  transactions-db-data:
  ai-db-data:
